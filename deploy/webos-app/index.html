<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Family Calendar</title>
  <style>
    * { margin: 0; padding: 0; }
    html, body {
      width: 100%;
      height: 100%;
      background: #0f0f14;
      color: #f0f1f5;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .loading {
      text-align: center;
    }
    .loading h1 {
      font-size: 48px;
      margin-bottom: 16px;
    }
    .loading p {
      font-size: 24px;
      color: #a0a7b4;
    }
    .error {
      display: none;
      text-align: center;
    }
    .error h1 {
      font-size: 36px;
      color: #ef4444;
      margin-bottom: 16px;
    }
    .error p {
      font-size: 20px;
      color: #a0a7b4;
      max-width: 600px;
      line-height: 1.5;
    }
    .error code {
      display: block;
      margin-top: 24px;
      font-size: 28px;
      color: #f0f1f5;
      background: #1a1a24;
      padding: 12px 24px;
      border-radius: 8px;
    }
  </style>
</head>
<body>
  <div class="loading" id="loading">
    <h1>Family Calendar</h1>
    <p>Connecting to server...</p>
  </div>
  <div class="error" id="error">
    <h1>Can't reach calendar server</h1>
    <p>Make sure the Family Calendar server is running on your network.</p>
    <code id="server-url"></code>
    <p style="margin-top: 24px">Will retry automatically...</p>
  </div>

  <script>
    // ── Configuration ──────────────────────────────────
    // Change this to your server's local IP address.
    // Find it by running: node -e "console.log(require('os').networkInterfaces())"
    // or check the server startup log for "Server listening at http://..."
    var SERVER_URL = 'http://SERVER_IP:3000';

    // ── Auto-discover or redirect ──────────────────────
    var loadingEl = document.getElementById('loading');
    var errorEl = document.getElementById('error');
    var serverUrlEl = document.getElementById('server-url');

    function tryConnect() {
      serverUrlEl.textContent = SERVER_URL;

      fetch(SERVER_URL + '/api/health', { mode: 'cors' })
        .then(function(res) {
          if (res.ok) {
            // Server is reachable — navigate to it
            window.location.href = SERVER_URL;
          } else {
            showError();
          }
        })
        .catch(function() {
          showError();
        });
    }

    function showError() {
      loadingEl.style.display = 'none';
      errorEl.style.display = 'block';
      // Retry every 10 seconds
      setTimeout(function() {
        errorEl.style.display = 'none';
        loadingEl.style.display = 'block';
        tryConnect();
      }, 10000);
    }

    tryConnect();
  </script>
</body>
</html>
